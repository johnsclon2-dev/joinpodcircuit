<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PodCircuit Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-config.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f5f0e8; }
  .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0e0c0a; }
  .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 350px; }
  .login-card h2 { margin-bottom: 20px; }
  input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
  button { background: #c9a84c; color: #0e0c0a; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
  .dashboard { display: none; }
  .dashboard.visible { display: block; }
  .admin-header { background: #0e0c0a; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 24px; }
  .stat-card { background: white; padding: 20px; text-align: center; border-radius: 12px; }
  .stat-number { font-size: 2rem; font-weight: bold; color: #c9a84c; }
  .tabs { display: flex; gap: 8px; padding: 0 24px; }
  .tab-btn { background: white; border: 1px solid #ddd; padding: 10px 24px; border-radius: 30px; cursor: pointer; }
  .tab-btn.active { background: #0e0c0a; color: white; }
  .profiles-container { padding: 24px; }
  .profile-card { background: white; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
  .profile-header { background: #f5f0e8; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  .profile-name { font-weight: bold; font-size: 1.1rem; }
  .profile-email { color: #666; font-size: 0.8rem; }
  .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
  .status-pending { background: #fff3e0; color: #c9a84c; }
  .status-approved { background: #e0f5e8; color: #27ae60; }
  .profile-body { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .profile-actions { padding: 16px 24px; background: #f5f0e8; display: flex; gap: 12px; justify-content: flex-end; }
  .btn-approve { background: #27ae60; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; }
  .btn-reject { background: #c0392b; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; }
  @media (max-width: 600px) { .profile-body { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h2>🔐 Admin Access</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="adminLogin()">Sign In</button>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="admin-header">
    <div>🎙 PodCircuit Admin</div>
    <button onclick="logout()" style="width:auto; background:transparent; color:#c9a84c; border:1px solid #c9a84c;">Logout</button>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-number" id="statPending">0</div><div>Pending</div></div>
    <div class="stat-card"><div class="stat-number" id="statApproved">0</div><div>Approved</div></div>
    <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div>Total</div></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="loadProfiles('pending')">Pending</button>
    <button class="tab-btn" onclick="loadProfiles('approved')">Approved</button>
  </div>
  <div class="profiles-container" id="profilesContainer"><div style="text-align:center; padding:40px;">Loading...</div></div>
</div>

<script>
let currentStatus = 'pending';

if (sessionStorage.getItem('admin_logged_in') === 'true') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').classList.add('visible');
  loadProfiles('pending');
}

async function adminLogin() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  let adminPassword = 'podcircuit2026';
  if (typeof ADMIN_PASSWORD !== 'undefined') adminPassword = ADMIN_PASSWORD;
  if (username === 'admin' && password === adminPassword) {
    sessionStorage.setItem('admin_logged_in', 'true');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    loadProfiles('pending');
  } else {
    alert('Invalid credentials');
  }
}

function logout() {
  sessionStorage.removeItem('admin_logged_in');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').classList.remove('visible');
}

async function loadProfiles(status) {
  currentStatus = status;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  const container = document.getElementById('profilesContainer');
  container.innerHTML = '<div style="text-align:center; padding:40px;">Loading...</div>';
  try {
    let profiles = [];
    if (typeof dbGetProfilesByStatus !== 'undefined') {
      const { data, error } = await dbGetProfilesByStatus(status);
      if (!error && data) profiles = data;
    }
    await updateStats();
    if (profiles.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding:40px;">No applications</div>';
      return;
    }
    container.innerHTML = profiles.map(p => renderProfile(p, status)).join('');
  } catch(err) {
    container.innerHTML = '<div style="text-align:center; padding:40px;">Error loading</div>';
  }
}

async function updateStats() {
  try {
    if (typeof dbGetProfilesByStatus !== 'undefined') {
      const { data: pending } = await dbGetProfilesByStatus('pending');
      const { data: approved } = await dbGetProfilesByStatus('approved');
      document.getElementById('statPending').textContent = pending?.length || 0;
      document.getElementById('statApproved').textContent = approved?.length || 0;
      document.getElementById('statTotal').textContent = (pending?.length || 0) + (approved?.length || 0);
    }
  } catch(err) {}
}

function renderProfile(p, status) {
  const name = (p.first_name || '') + ' ' + (p.last_name || '');
  const statusClass = status === 'pending' ? 'status-pending' : 'status-approved';
  const statusLabel = status === 'pending' ? '⏳ Pending' : '✅ Approved';
  return `<div class="profile-card">
    <div class="profile-header">
      <div><div class="profile-name">${escapeHtml(name)}</div><div class="profile-email">${escapeHtml(p.email || '')}</div></div>
      <div><span class="status-badge ${statusClass}">${statusLabel}</span></div>
    </div>
    <div class="profile-body">
      <div><strong>Story:</strong><br>${escapeHtml((p.story || '').substring(0, 200))}</div>
      <div><strong>Social:</strong><br>📸 ${p.ig_followers?.toLocaleString() || 0} · 🎵 ${p.tt_followers?.toLocaleString() || 0}</div>
    </div>
    ${status === 'pending' ? `<div class="profile-actions">
      <button class="btn-approve" onclick="updateStatus('${p.user_id}', 'approved')">✓ Approve</button>
      <button class="btn-reject" onclick="updateStatus('${p.user_id}', 'rejected')">✗ Reject</button>
    </div>` : ''}
  </div>`;
}

async function updateStatus(userId, newStatus) {
  if (!confirm(`Are you sure?`)) return;
  try {
    if (typeof dbUpdateStatus !== 'undefined') {
      await dbUpdateStatus(userId, newStatus);
    }
    loadProfiles(currentStatus);
  } catch(err) {
    alert('Error updating status');
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
